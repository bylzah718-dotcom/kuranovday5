<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Watch App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="appContainer" class="watch-container state-78">
        
        <div class="header">
            <span class="time" id="clock">00:00</span>
            <span class="title" id="headerTitle"></span>
            <div class="header-icon" id="headerRightIcon" onclick="handleHeaderIconClick()"></div>
        </div>

        <div id="screen-home" class="screen active">
            <div class="screen-content">
                <div class="pulse-section">
                    <div class="pulse-value dynamic-color"><span id="pulseNumber">78</span><span>bpm</span></div>
                    <svg class="pulse-chart" viewBox="0 0 70 45">
                        <path d="M0,22.5 L20,22.5 L25,5 L32,40 L38,15 L42,27 L48,22.5 L70,22.5" 
                              fill="none" stroke="var(--theme-color)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="dynamic-stroke"/>
                        <circle cx="65" cy="22.5" r="4" class="dynamic-fill" />
                    </svg>
                </div>

                <div class="tags-container">
                    <div class="tag">
                        <div class="tag-icon dynamic-bg"></div>
                        <span id="tagLeftText">Кайф</span>
                    </div>
                    <div class="tag">
                        <div class="tag-icon dynamic-bg"></div>
                        <span id="tagRightText">Гармония</span>
                    </div>
                </div>

                <div class="player-card">
                    <div class="track-cover" id="trackCover" style="background-image: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80');"></div>
                    <div class="track-info">
                        <div class="track-title" id="trackTitle">Aria math</div>
                        <div class="track-artist" id="trackArtist">alterity</div>
                    </div>
                    <div class="player-controls">
                        <svg class="btn-play dynamic-fill" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="btn-repeat dynamic-fill" viewBox="0 0 24 24" id="repeatIcon">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-music" class="screen">
            <div class="screen-content">
                <div class="music-box">
                    <div class="music-box-title">Топы</div>
                    <div class="top-list">
                        <div class="top-item" style="background-color: #FFA500; color: #000;">
                            <span>Музыка</span>
                            <span>Топ -1 🏆</span>
                        </div>
                        <div class="top-item" style="background-color: #00FF00; color: #000;">
                            <span>Музыка</span>
                            <span>Топ -2 🌿</span>
                        </div>
                        <div class="top-item" style="background-color: #8E8E93; color: #fff;">
                            <span>Музыка</span>
                            <span>Топ -3</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-settings" class="screen">
            <div class="screen-content">
                <div class="settings-list">
                    <div class="settings-item">
                        <span class="settings-label">Пульс</span>
                        <label class="switch">
                            <input type="checkbox" id="pulseToggle" checked onchange="togglePulseState()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <span class="settings-label">Авто.настрой</span>
                        <label class="switch">
                            <input type="checkbox" id="autoToggle">
                            <span class="slider" id="autoSlider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <span class="settings-label">Импорт музыки:</span>
                        <div id="spotifyContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="screen-content">
                <div class="profile-container">
                    <div class="avatar-placeholder">
                        <svg width="35" height="35" viewBox="0 0 24 24" fill="#000">
                            <path d="M19 19H5v-1.7c0-2.4 4-3.8 7-3.8s7 1.4 7 3.8V19zm-7-8c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4z"/>
                        </svg>
                    </div>
                    <div class="username">USER USEROVICH</div>
                    <div class="info-rows">
                        <div class="info-row">
                            <span>Возраст</span>
                            <div class="custom-select-wrapper" onclick="toggleAgeDropdown(event)">
                                <span class="selected-age-display" id="ageDisplay">25 лет</span>
                                <div class="custom-options-box" id="customOptionsBox"></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <span>Рекоменд пульс</span>
                            <span id="recommendedPulse">90 уд/мин</span>
                        </div>
                        
                        <div class="pulse-picker-row">
                            <div id="circle-78" class="pulse-circle circle-green active" onclick="setPulseState(78)"></div>
                            <div id="circle-90" class="pulse-circle circle-orange" onclick="setPulseState(90)"></div>
                            <div id="circle-120" class="pulse-circle circle-red" onclick="setPulseState(120)"></div>
                        </div>

                        <div class="info-row" style="margin-top: 4px;">
                            <span>Сменить режим вождения</span>
                            <div class="drive-mode-indicator dynamic-bg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="switchScreen('home')">
                <svg id="nav-icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="nav-item" onclick="switchScreen('music')">
                <svg id="nav-icon-music" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </div>
            <div class="nav-item" onclick="switchScreen('settings')">
                <svg id="nav-icon-settings" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l-.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3s1.07-3 3-3 3 1.57 3 3-1.07 3-3 3z"/></svg>
            </div>
        </div>

    </div>

    <script src = 'script.js'></script>
</body>
</html>
